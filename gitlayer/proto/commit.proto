syntax = "proto3";

package gitlayer;

import "repository.proto";

// Commit service handles commit operations
service CommitService {
    // Get a single commit
    rpc GetCommit(GetCommitRequest) returns (GetCommitResponse);
    
    // List commits (log)
    rpc ListCommits(ListCommitsRequest) returns (ListCommitsResponse);
    
    // Stream commits for large histories
    rpc StreamCommits(StreamCommitsRequest) returns (stream Commit);
    
    // Get commit count
    rpc CountCommits(CountCommitsRequest) returns (CountCommitsResponse);
    
    // Find commits by message or author
    rpc FindCommits(FindCommitsRequest) returns (FindCommitsResponse);
    
    // Get ancestor relationship
    rpc IsAncestor(IsAncestorRequest) returns (IsAncestorResponse);
    
    // Get merge base
    rpc MergeBase(MergeBaseRequest) returns (MergeBaseResponse);
    
    // List commits between two refs
    rpc CommitsBetween(CommitsBetweenRequest) returns (CommitsBetweenResponse);
    
    // Get commit statistics
    rpc GetCommitStats(GetCommitStatsRequest) returns (GetCommitStatsResponse);
}

message Signature {
    string name = 1;
    string email = 2;
    int64 timestamp = 3;
    string timezone = 4;
}

message Commit {
    string id = 1;
    string tree_id = 2;
    repeated string parent_ids = 3;
    Signature author = 4;
    Signature committer = 5;
    string message = 6;
    string short_message = 7;
    // GPG signature if signed
    string signature = 8;
    // Verification status
    string signature_status = 9;
}

message GetCommitRequest {
    Repository repository = 1;
    // Commit SHA or ref name
    string revision = 2;
}

message GetCommitResponse {
    Commit commit = 1;
    bool found = 2;
}

message ListCommitsRequest {
    Repository repository = 1;
    // Starting point (ref or commit)
    string revision = 2;
    // Optional: path filter
    string path = 3;
    // Pagination
    int32 limit = 4;
    int32 offset = 5;
    // Include merge commits
    bool include_merges = 6;
    // Order: "date", "topo"
    string order = 7;
    // Optional: after timestamp (Unix epoch)
    int64 after = 8;
    // Optional: before timestamp (Unix epoch)
    int64 before = 9;
}

message ListCommitsResponse {
    repeated Commit commits = 1;
    int32 total_count = 2;
    bool has_more = 3;
}

message StreamCommitsRequest {
    Repository repository = 1;
    string revision = 2;
    string path = 3;
    int32 limit = 4;
}

message CountCommitsRequest {
    Repository repository = 1;
    string revision = 2;
    string path = 3;
}

message CountCommitsResponse {
    int64 count = 1;
}

message FindCommitsRequest {
    Repository repository = 1;
    string query = 2;
    // Search in: "message", "author", "all"
    string search_in = 3;
    int32 limit = 4;
    int32 offset = 5;
}

message FindCommitsResponse {
    repeated Commit commits = 1;
}

message IsAncestorRequest {
    Repository repository = 1;
    string ancestor = 2;
    string descendant = 3;
}

message IsAncestorResponse {
    bool is_ancestor = 1;
}

message MergeBaseRequest {
    Repository repository = 1;
    repeated string revisions = 2;
}

message MergeBaseResponse {
    string commit_id = 1;
    bool found = 2;
}

message CommitsBetweenRequest {
    Repository repository = 1;
    string from = 2;
    string to = 3;
    int32 limit = 4;
}

message CommitsBetweenResponse {
    repeated Commit commits = 1;
}

message CommitStats {
    int32 additions = 1;
    int32 deletions = 2;
    int32 files_changed = 3;
}

message GetCommitStatsRequest {
    Repository repository = 1;
    string revision = 2;
}

message GetCommitStatsResponse {
    CommitStats stats = 1;
}
