# GitFox Runner Configuration Example
# Copy this file to config.toml and customize for your environment

# Server connection settings
server_url = "ws://localhost:8080/api/v1/runner/ws"
token = "your-runner-token-here"
name = "my-runner"

# Runner tags for job selection
tags = ["docker", "linux"]

# Executor type: "shell", "docker" or "kubernetes" (alias: "k8s")
# - shell:      Run scripts directly on the host (fast, less isolated)
# - docker:     Run scripts inside Docker containers (isolated)
# - kubernetes: Run scripts inside Kubernetes Pods (cloud-native, highly isolated)
executor = "docker"

# -----------------------------------------------------------------------------
# Directory Configuration
# -----------------------------------------------------------------------------

# Work directory for job builds
# Default: "./builds" (relative to runner executable)
# WARNING: Do NOT use /tmp as it may be cleaned by system
builds_dir = "./builds"

# Maximum work directory size in MB per job
# Default: 10240 (10 GB)
# Jobs exceeding this limit will be terminated
max_work_dir_size_mb = 10240

# Clean builds directory after job completion
# Default: true
# Set to false to preserve build artifacts for debugging
clean_builds = true

# -----------------------------------------------------------------------------
# Execution Configuration
# -----------------------------------------------------------------------------

# Maximum concurrent jobs
# Default: 1
# Increase for multi-core machines, but consider memory/disk usage
concurrent_jobs = 1

# Default container image (for docker and kubernetes executors)
# Default: "alpine:latest"
# Can be overridden per job with CI_DOCKER_IMAGE (docker) or CI_KUBERNETES_IMAGE (k8s) variable
default_image = "alpine:latest"

# -----------------------------------------------------------------------------
# Kubernetes Executor Settings (only used when executor = "kubernetes")
# -----------------------------------------------------------------------------

# Kubernetes namespace to create Pods in
# Default: "default"
kubernetes_namespace = "default"

# Path to kubeconfig file. If omitted, uses KUBECONFIG env var or in-cluster config
# kubernetes_config = "/home/user/.kube/config"

# -----------------------------------------------------------------------------
# Security Notes
# -----------------------------------------------------------------------------
# 
# Shell Executor:
# - Runs scripts with runner process permissions
# - Uses dedicated builds directory (not /tmp)
# - Detects dangerous commands (rm -rf /, fork bombs, etc.)
# - Size limit prevents disk exhaustion
# - No sudo/root access by default
#
# Docker Executor (Recommended for single-node CI):
# - Full isolation per job via Docker containers
# - No access to host filesystem (except /builds volume)
# - Automatic cleanup after job completion
# - Requires Docker to be installed on the runner host
#
# Kubernetes Executor (Recommended for cloud/cluster CI):
# - Each job runs in a dedicated Pod (strongest isolation)
# - Requires kubectl accessible and cluster credentials configured
# - Pods are deleted automatically after job completion
# - Resource limits (memory: 2Gi, cpu: 2) applied per Pod
#
# Production Recommendations:
# 1. Use docker or kubernetes executor for untrusted code
# 2. Run runner as non-root user without sudo
# 3. Set appropriate max_work_dir_size_mb based on disk capacity
# 4. Enable clean_builds to prevent disk exhaustion
# 5. Use dedicated disk/partition for builds_dir
