<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline' 'unsafe-eval' blob:;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: https:;
    font-src 'self' data:;
    connect-src 'self' https: wss:;
    frame-src 'self' https:;
    worker-src 'self' blob:;
  ">
  <title>GitFox WebIDE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }
    
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: #1e1e2e;
      z-index: 9999;
    }
    
    .loader-spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #45475a;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loader-text {
      font-size: 14px;
      color: #a6adc8;
    }
    
    .loader-error {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: #f38ba8;
    }
    
    .loader-error button {
      padding: 8px 16px;
      background: #89b4fa;
      color: #1e1e2e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .loader-error button:hover {
      background: #b4befe;
    }
    
    #workbench {
      width: 100%;
      height: 100%;
    }
    
    /* VS Code workbench will be mounted here */
    .monaco-workbench {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="loader-spinner"></div>
    <div class="loader-text">正在加载 GitFox WebIDE...</div>
  </div>
  
  <div id="workbench"></div>
  
  <!-- Bootstrap script -->
  <script type="module" src="./src/main.ts"></script>
</body>
</html>
